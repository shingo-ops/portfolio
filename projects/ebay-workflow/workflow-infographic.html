<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eBay出品ツール - 業務フロー | インフォグラフィック</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: #e2e8f0;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 1.1rem;
            color: #94a3b8;
        }

        .svg-container {
            width: 100%;
            max-width: 1400px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            animation: fadeInUp 1s ease-out;
        }

        svg {
            width: 100%;
            height: auto;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            .svg-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>eBay出品ツール 業務フロー</h1>
        <p>リサーチから出品完了まで、わかりやすく視覚化</p>
    </div>

    <div class="svg-container">
        <svg viewBox="0 0 1200 1530" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- グラデーション定義 -->
                <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
                </linearGradient>

                <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
                </linearGradient>

                <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
                </linearGradient>

                <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
                </linearGradient>

                <linearGradient id="pinkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
                </linearGradient>

                <linearGradient id="indigoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
                </linearGradient>

                <!-- 矢印マーカー -->
                <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
                    <polygon points="0 0, 12 6, 0 12" fill="#8b5cf6" />
                </marker>

                <!-- スタイル定義 -->
                <style>
                    .phase-label {
                        font-family: Arial, sans-serif;
                        font-size: 20px;
                        font-weight: 700;
                        fill: #ffffff;
                    }

                    .step-number {
                        font-family: Arial, sans-serif;
                        font-size: 42px;
                        font-weight: 800;
                        fill: #ffffff;
                        opacity: 0.25;
                    }

                    .step-title {
                        font-family: Arial, sans-serif;
                        font-size: 20px;
                        font-weight: 700;
                        fill: #ffffff;
                    }

                    .step-desc {
                        font-family: Arial, sans-serif;
                        font-size: 13px;
                        font-weight: 400;
                        fill: #cbd5e1;
                    }

                    .flow-line {
                        stroke: #8b5cf6;
                        stroke-width: 3;
                        fill: none;
                        marker-end: url(#arrowhead);
                    }

                    .step-card {
                        transition: all 0.3s ease;
                        cursor: pointer;
                    }

                    .step-card:hover rect {
                        filter: brightness(1.15);
                    }

                    @keyframes pulse {
                        0%, 100% { opacity: 1; }
                        50% { opacity: 0.5; }
                    }

                    .pulse-ring {
                        animation: pulse 2s infinite;
                    }

                    .impact-text {
                        font-family: Arial, sans-serif;
                        font-size: 22px;
                        font-weight: 800;
                        fill: #fbbf24;
                    }
                </style>
            </defs>

            <!-- フェーズ1: リサーチ＆準備 -->
            <g id="phase1">
                <!-- 背景 -->
                <rect x="50" y="50" width="1100" height="290" rx="20" fill="rgba(59, 130, 246, 0.08)" stroke="url(#blueGradient)" stroke-width="2"/>

                <!-- フェーズタイトル -->
                <text class="phase-label" x="600" y="90" text-anchor="middle" fill="url(#blueGradient)">フェーズ 1: リサーチ＆出品シートに自動転記</text>

                <!-- ステップ1: リサーチ業務（統合） -->
                <g class="step-card">
                    <rect x="250" y="130" width="700" height="120" rx="12" fill="rgba(30, 58, 95, 0.9)" stroke="url(#blueGradient)" stroke-width="2"/>

                    <circle class="icon-circle" cx="330" cy="190" r="35" fill="url(#blueGradient)"/>
                    <g transform="translate(330, 190)">
                        <circle cx="0" cy="-6" r="8" fill="#ffffff"/>
                        <path d="M-12,12 Q-12,4 0,4 Q12,4 12,12 L12,16 L-12,16 Z" fill="#ffffff"/>
                        <circle cx="6" cy="6" r="5" fill="none" stroke="#ffffff" stroke-width="2"/>
                        <line x1="10" y1="10" x2="14" y2="14" stroke="#ffffff" stroke-width="2"/>
                    </g>

                    <text class="step-number" x="260" y="210">01</text>
                    <text class="step-title" x="390" y="175">リサーチ業務</text>
                    <text class="step-desc" x="390" y="200">カテゴリなどの自動取得、出品シートへの自動記入</text>
                </g>

                <!-- インパクトメッセージ -->
                <g>
                    <text class="impact-text" x="600" y="290" text-anchor="middle">✓ eBayからの自動取得 + 出品シートへの自動入力を実装して手作業低減</text>
                </g>
            </g>

            <!-- 矢印 -->
            <path class="flow-line" d="M 600 360 L 600 410"/>

            <!-- フェーズ2: 確認＆調整 -->
            <g id="phase2">
                <rect x="50" y="430" width="1100" height="290" rx="20" fill="rgba(16, 185, 129, 0.08)" stroke="url(#greenGradient)" stroke-width="2"/>

                <text class="phase-label" x="600" y="470" text-anchor="middle" fill="url(#greenGradient)">フェーズ 2: 出品シートで編集&出品</text>

                <!-- ステップ2: 出品の自動化（統合） -->
                <g class="step-card">
                    <rect x="250" y="510" width="700" height="120" rx="12" fill="rgba(30, 58, 95, 0.9)" stroke="url(#greenGradient)" stroke-width="2"/>

                    <circle class="icon-circle pulse-ring" cx="330" cy="570" r="35" fill="url(#greenGradient)"/>
                    <g transform="translate(330, 570)">
                        <circle cx="0" cy="-6" r="8" fill="#ffffff"/>
                        <path d="M-12,12 Q-12,4 0,4 Q12,4 12,12 L12,16 L-12,16 Z" fill="#ffffff"/>
                        <circle cx="8" cy="-12" r="6" fill="#10b981"/>
                        <path d="M5,-12 L7,-10 L11,-14" stroke="#ffffff" stroke-width="2" fill="none"/>
                    </g>

                    <text class="step-number" x="260" y="590">02</text>
                    <text class="step-title" x="390" y="555">出品の自動化</text>
                    <text class="step-desc" x="390" y="580">手作業の転記をなくし、出品の全自動化</text>
                </g>

                <!-- インパクトメッセージ -->
                <g>
                    <text class="impact-text" x="600" y="670" text-anchor="middle">✓ 手作業の転記をなくし、出品の全自動化</text>
                </g>
            </g>

            <!-- 分岐矢印 -->
            <path class="flow-line" d="M 600 720 L 600 770"/>

            <!-- 分岐ポイント -->
            <circle cx="600" cy="800" r="25" fill="url(#orangeGradient)" opacity="0.9"/>
            <text x="600" y="810" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">⚡</text>

            <!-- 左右への分岐 -->
            <path class="flow-line" d="M 600 825 L 600 870 L 300 870 L 300 910"/>
            <path class="flow-line" d="M 600 825 L 600 870 L 900 870 L 900 910"/>

            <!-- 分岐ラベル -->
            <rect x="210" y="855" width="100" height="30" rx="6" fill="rgba(139, 92, 246, 0.9)"/>
            <text x="260" y="876" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">並行処理①</text>

            <rect x="850" y="855" width="100" height="30" rx="6" fill="rgba(139, 92, 246, 0.9)"/>
            <text x="900" y="876" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">並行処理②</text>

            <!-- フェーズ3: 並行処理 -->
            <g id="phase3">
                <!-- 左側: eBay出品 -->
                <g>
                    <rect x="50" y="930" width="500" height="450" rx="20" fill="rgba(236, 72, 153, 0.08)" stroke="url(#pinkGradient)" stroke-width="2"/>
                    <text class="phase-label" x="300" y="970" text-anchor="middle" fill="url(#pinkGradient)">並行処理 ①: eBay出品</text>

                    <!-- ステップ3: セルスタアップロード -->
                    <g class="step-card">
                        <rect x="100" y="1010" width="400" height="140" rx="12" fill="rgba(30, 58, 95, 0.9)" stroke="url(#pinkGradient)" stroke-width="2"/>

                        <circle class="icon-circle" cx="160" cy="1080" r="35" fill="url(#pinkGradient)"/>
                        <g transform="translate(160, 1080)">
                            <rect x="-10" y="-6" width="20" height="12" rx="2" fill="none" stroke="#ffffff" stroke-width="2"/>
                            <path d="M0,-10 L-6,0 L-3,0 L-3,6 L3,6 L3,0 L6,0 Z" fill="#ffffff"/>
                        </g>

                        <text class="step-number" x="110" y="1095">03</text>
                        <text class="step-title" x="220" y="1060">セルスタアップロード</text>
                        <text class="step-desc" x="220" y="1085">セルスタ経由でeBayへ商品データを</text>
                        <text class="step-desc" x="220" y="1105">アップロードし、自動的に出品します</text>
                    </g>

                    <path class="flow-line" d="M 300 1170 L 300 1210"/>

                    <!-- 完了 -->
                    <g class="step-card">
                        <rect x="100" y="1230" width="400" height="100" rx="12" fill="rgba(16, 185, 129, 0.15)" stroke="url(#greenGradient)" stroke-width="2"/>

                        <circle class="icon-circle" cx="160" cy="1280" r="30" fill="url(#greenGradient)"/>
                        <path d="M150,1280 L156,1288 L170,1272" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>

                        <text class="step-title" x="210" y="1275" fill="#10b981">✓ eBay出品完了</text>
                        <text class="step-desc" x="210" y="1295">商品がeBayに掲載されました</text>
                    </g>
                </g>

                <!-- 右側: データ保管 -->
                <g>
                    <rect x="650" y="930" width="500" height="450" rx="20" fill="rgba(99, 102, 241, 0.08)" stroke="url(#indigoGradient)" stroke-width="2"/>
                    <text class="phase-label" x="900" y="970" text-anchor="middle" fill="url(#indigoGradient)">並行処理 ②: データ保管</text>

                    <!-- ステップ4: データベース保存 -->
                    <g class="step-card">
                        <rect x="700" y="1010" width="400" height="140" rx="12" fill="rgba(30, 58, 95, 0.9)" stroke="url(#indigoGradient)" stroke-width="2"/>

                        <circle class="icon-circle" cx="760" cy="1080" r="35" fill="url(#indigoGradient)"/>
                        <g transform="translate(760, 1080)">
                            <ellipse cx="0" cy="-8" rx="12" ry="4" fill="#ffffff"/>
                            <rect x="-12" y="-8" width="24" height="16" fill="#ffffff"/>
                            <ellipse cx="0" cy="8" rx="12" ry="4" fill="#ffffff"/>
                            <ellipse cx="0" cy="0" rx="12" ry="4" fill="#6366f1" opacity="0.5"/>
                        </g>

                        <text class="step-number" x="710" y="1095">04</text>
                        <text class="step-title" x="820" y="1060">データ保管庫に保存</text>
                        <text class="step-desc" x="820" y="1085">出品情報をデータベースにバックアップ</text>
                        <text class="step-desc" x="820" y="1105">として保存し、履歴を記録します</text>
                    </g>

                    <path class="flow-line" d="M 900 1170 L 900 1210"/>

                    <!-- 完了 -->
                    <g class="step-card">
                        <rect x="700" y="1230" width="400" height="100" rx="12" fill="rgba(16, 185, 129, 0.15)" stroke="url(#greenGradient)" stroke-width="2"/>

                        <circle class="icon-circle" cx="760" cy="1280" r="30" fill="url(#greenGradient)"/>
                        <path d="M750,1280 L756,1288 L770,1272" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>

                        <text class="step-title" x="810" y="1275" fill="#10b981">✓ データ保管完了</text>
                        <text class="step-desc" x="810" y="1295">バックアップが保存されました</text>
                    </g>
                </g>
            </g>

            <!-- フッター -->
            <text x="600" y="1450" text-anchor="middle" font-size="15" fill="#64748b">eBay出品ツール - 完全自動化フロー</text>
            <text x="600" y="1480" text-anchor="middle" font-size="13" fill="#64748b">リサーチから出品完了まで、シームレスに連携</text>
        </svg>
    </div>

    <script>
        // インタラクティブ効果
        document.querySelectorAll('.step-card').forEach(card => {
            card.addEventListener('click', function() {
                const title = this.querySelector('.step-title');
                if (title) {
                    console.log('Step:', title.textContent);
                }
            });
        });
    </script>
</body>
</html>
